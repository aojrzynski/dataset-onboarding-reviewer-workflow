name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: CLI help smoke test
        run: dataset-onboarding-reviewer --help

      - name: CLI version smoke test
        run: dataset-onboarding-reviewer --version

      - name: CLI intake/profile run smoke test
        run: dataset-onboarding-reviewer examples/customer_onboarding_sample.csv --context examples/customer_onboarding_context.yaml --answers examples/customer_reviewer_answers.yaml --output-dir outputs/ci_smoke
